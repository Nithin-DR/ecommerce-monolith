spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8081